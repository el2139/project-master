<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALS Core Project Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#f7f7f5;--surface:#fff;--surface2:#f0f0ec;--border:#e0dfd8;
    --text:#1a1a18;--text-muted:#7a7a72;--text-faint:#b0b0a8;
    --project:#1a4a8a;--project-light:#e8effa;
    --exp:#c45a10;--exp-light:#fdf0e8;
    --admin:#2a7a4a;--admin-light:#e8f5ee;
    --urgent-bg:#fdeaea;--urgent-text:#c42a2a;
    --high-bg:#fff3e0;--high-text:#b85000;
    --medium-bg:#fffbe6;--medium-text:#8a6800;
    --radius:4px;
    --mono:'IBM Plex Mono',monospace;
    --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  .app{display:flex;height:100vh;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
  .lab-name{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
  .app-title{font-size:16px;font-weight:600;}
  .sidebar-scroll{overflow-y:auto;flex:1;}
  .sidebar-section{padding:12px 0;border-bottom:1px solid var(--border);}
  .sidebar-section-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);padding:0 16px 6px;display:flex;align-items:center;justify-content:space-between;}
  .sidebar-add-btn{font-size:14px;cursor:pointer;color:var(--text-faint);line-height:1;padding:0 4px;border-radius:2px;}
  .sidebar-add-btn:hover{color:var(--text);background:var(--surface2);}
  .sidebar-item{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;font-size:13px;color:var(--text);}
  .sidebar-item:hover{background:var(--surface2);}
  .sidebar-drag-handle{color:var(--text-faint);font-size:12px;cursor:grab;padding:0 4px 0 0;opacity:0;transition:opacity .15s;flex-shrink:0;}
  .sidebar-item:hover .sidebar-drag-handle{opacity:1;}
  .sidebar-item.sidebar-drag-over{border-top:2px solid var(--project);}
  .sidebar-item.sidebar-dragging{opacity:.4;}
  .sidebar-item.active{background:var(--surface2);font-weight:500;}
  .sidebar-item.active.project-item{border-left-color:var(--project);color:var(--project);}
  .sidebar-item.active.exp-item{border-left-color:var(--exp);color:var(--exp);}
  .sidebar-item.active.admin-item{border-left-color:var(--admin);color:var(--admin);}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .dot-project{background:var(--project);}
  .dot-exp{background:var(--exp);}
  .dot-admin{background:var(--admin);}
  .dot-overview{background:var(--text-muted);}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .page-title{font-size:18px;font-weight:600;}
  .page-subtitle{font-size:12px;color:var(--text-muted);margin-top:1px;}
  .topbar-actions{display:flex;gap:8px;align-items:center;}
  .content{flex:1;overflow-y:auto;padding:28px;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* Buttons */
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .1s;}
  .btn:hover{background:var(--surface2);}
  .btn-primary{background:var(--text);color:var(--surface);border-color:var(--text);}
  .btn-primary:hover{background:#333;}
  .btn-danger{background:var(--urgent-bg);color:var(--urgent-text);border-color:var(--urgent-text);}
  .btn-danger:hover{background:#fcc;}
  .btn-sm{padding:3px 8px;font-size:10px;}
  .btn-icon{padding:4px 7px;font-size:14px;line-height:1;min-width:28px;text-align:center;}

  /* Badges */
  .badge{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:3px 8px;border-radius:2px;text-transform:uppercase;font-weight:500;}
  .badge-project{background:var(--project-light);color:var(--project);}
  .badge-exp{background:var(--exp-light);color:var(--exp);}
  .badge-admin{background:var(--admin-light);color:var(--admin);}

  /* Status / Priority pills */
  .status-pill{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
  .status-todo{background:var(--project-light);color:var(--project);}
  .status-ongoing{background:#fff3e0;color:var(--exp);}
  .status-complete{background:var(--admin-light);color:var(--admin);}
  .status-urgent{background:var(--urgent-bg);color:var(--urgent-text);}
  .priority-tag{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:2px;}
  .priority-urgent{background:var(--urgent-bg);color:var(--urgent-text);}
  .priority-high{background:var(--high-bg);color:var(--high-text);}
  .priority-medium{background:var(--medium-bg);color:var(--medium-text);}
  .priority-low{background:var(--surface2);color:var(--text-muted);}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px;}
  .card-title{font-size:15px;font-weight:600;}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;}
  .meta-tag{font-size:11px;padding:2px 7px;border-radius:2px;background:var(--surface2);color:var(--text-muted);font-family:var(--mono);}
  .meta-tag.person{background:#f0f0ec;color:#444;}
  .meta-tag.funding{background:var(--admin-light);color:var(--admin);}
  .notes-text{font-size:12px;color:var(--text-muted);line-height:1.6;margin-top:6px;}
  .section-header{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}

  /* Chips */
  .exp-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;background:var(--exp-light);color:var(--exp);border-radius:2px;font-size:11px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;transition:border-color .1s;}
  .exp-chip:hover{border-color:var(--exp);}
  .proj-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;background:var(--project-light);color:var(--project);border-radius:2px;font-size:11px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;}
  .proj-chip:hover{border-color:var(--project);}
  .chip-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .exp-links{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .exp-links-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
  .exp-chips{display:flex;flex-wrap:wrap;gap:6px;}

  /* Todo */
  .todo-list{list-style:none;}
  .todo-list li{display:flex;align-items:flex-start;gap:9px;padding:7px 0;font-size:13px;line-height:1.5;border-bottom:1px solid var(--border);}
  .todo-list li:last-child{border-bottom:none;}
  .task-status{font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding:2px 7px;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-top:2px;border:1px solid transparent;user-select:none;transition:opacity .1s;}
  .task-status:hover{opacity:.75;}
  .task-status.ts-todo{background:var(--surface2);color:var(--text-muted);border-color:var(--border);}
  .task-status.ts-inprogress{background:#fff3e0;color:var(--exp);}
  .task-status.ts-done{background:var(--admin-light);color:var(--admin);}
  .todo-text-done{text-decoration:line-through;color:var(--text-faint);}
  .todo-actions{display:flex;gap:4px;margin-left:auto;opacity:0;transition:opacity .15s;flex-shrink:0;}
  .todo-list li:hover .todo-actions{opacity:1;}
  .task-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
  .task-link-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;}
  .task-link-chip.exp-link{background:var(--exp-light);color:var(--exp);}
  .task-link-chip.exp-link:hover{border-color:var(--exp);}
  .task-link-chip.proj-link{background:var(--project-light);color:var(--project);}
  .task-link-chip.proj-link:hover{border-color:var(--project);}
  .task-date-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono);background:var(--surface2);color:var(--text-muted);}
  .task-date-chip.overdue{background:var(--urgent-bg);color:var(--urgent-text);}
  .task-date-chip.completed-date{background:var(--admin-light);color:var(--admin);}
  .task-drive-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono);background:#e8f0fe;color:#1a73e8;cursor:pointer;border:1px solid transparent;text-decoration:none;}
  .task-drive-chip:hover{border-color:#1a73e8;}
  .task-priority-chip{display:inline-flex;align-items:center;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono);}
  .todo-body{flex:1;min-width:0;}
  .todo-list li{align-items:flex-start;}
  /* Task groups */
  .task-group{margin-bottom:12px;}
  .task-group-header{display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:4px;cursor:pointer;user-select:none;}
  .task-group-label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;}
  .task-group-count{font-family:var(--mono);font-size:10px;color:var(--text-faint);}
  .task-group-toggle{font-size:11px;color:var(--text-faint);margin-left:auto;}
  .task-group.group-todo .task-group-label{color:var(--text-muted);}
  .task-group.group-inprogress .task-group-label{color:var(--exp);}
  .task-group.group-done .task-group-label{color:var(--admin);}
  /* Drag handle */
  .drag-handle{color:var(--text-faint);cursor:grab;font-size:14px;padding:0 4px;flex-shrink:0;line-height:1;align-self:center;}
  .drag-handle:active{cursor:grabbing;}
  .todo-list li.dragging{opacity:.4;}
  .todo-list li.drag-over{border-top:2px solid var(--project);}
  .task-description{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:3px;white-space:pre-wrap;}
  .task-expand-btn{font-size:10px;font-family:var(--mono);color:var(--text-faint);cursor:pointer;background:none;border:none;padding:2px 0;margin-top:2px;text-align:left;}
  .task-expand-btn:hover{color:var(--text);}
  .subtask-list{list-style:none;margin-top:6px;padding-left:16px;border-left:2px solid var(--border);}
  .subtask-list li{display:flex;align-items:flex-start;gap:7px;padding:3px 0;font-size:12px;line-height:1.4;}
  .subtask-check{width:13px;height:13px;border:1.5px solid var(--border);border-radius:2px;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s,border-color .1s;}
  .subtask-check.checked{background:var(--admin);border-color:var(--admin);}
  .subtask-check.checked::after{content:'✓';color:white;font-size:8px;font-weight:bold;}
  .subtask-text-done{text-decoration:line-through;color:var(--text-faint);}
  .subtask-progress{font-size:10px;font-family:var(--mono);color:var(--text-faint);margin-top:2px;}

  /* Person cards */
  .people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:8px;}
  .person-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:box-shadow .15s,border-color .15s;text-align:center;}
  .person-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--project);}
  .person-avatar{width:38px;height:38px;border-radius:50%;background:var(--project-light);color:var(--project);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-family:var(--mono);}
  .person-name{font-size:13px;font-weight:500;margin-bottom:4px;}
  .person-task-count{font-family:var(--mono);font-size:10px;color:var(--text-muted);}

  /* Overview grid */
  .overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .stat-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
  .stat-value{font-size:28px;font-weight:300;line-height:1;}

  /* Matrix */
  .matrix-wrap{overflow-x:auto;}
  .matrix{border-collapse:collapse;width:100%;min-width:700px;}
  .matrix th,.matrix td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:12px;}
  .matrix th{background:var(--surface2);font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.05em;color:var(--text-muted);white-space:nowrap;}
  .matrix th.exp-th{color:var(--exp);background:var(--exp-light);}
  .matrix th.proj-th{color:var(--project);background:var(--project-light);}
  .matrix td{background:var(--surface);vertical-align:middle;}
  .matrix-dot{width:10px;height:10px;border-radius:50%;background:var(--exp);margin:auto;display:block;}
  .matrix td.has-link{text-align:center;}

  /* Inline editing */
  .editable{cursor:text;border-radius:2px;transition:background .1s;}
  .editable:hover{background:var(--surface2);}
  .editable:focus{outline:2px solid var(--project);background:var(--surface);border-radius:2px;}
  .edit-field{width:100%;background:var(--surface);border:1px solid var(--project);border-radius:var(--radius);padding:6px 10px;font-family:var(--sans);font-size:13px;color:var(--text);resize:vertical;}
  .edit-field:focus{outline:none;}
  select.edit-select{font-family:var(--mono);font-size:11px;padding:3px 6px;border-radius:2px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px;}
  .modal-field{margin-bottom:16px;}
  .modal-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;display:block;}
  .modal-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);}
  .modal-input:focus{outline:2px solid var(--project);border-color:transparent;}
  .modal-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);resize:vertical;min-height:80px;}
  .modal-textarea:focus{outline:2px solid var(--project);border-color:transparent;}
  .modal-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);}
  .modal-select:focus{outline:2px solid var(--project);}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
  .checkbox-group{display:flex;flex-wrap:wrap;gap:6px;}
  .checkbox-item{display:flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:12px;font-family:var(--mono);}
  .checkbox-item.checked-exp{background:var(--exp-light);border-color:var(--exp);color:var(--exp);}
  .checkbox-item.checked-proj{background:var(--project-light);border-color:var(--project);color:var(--project);}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--surface);padding:10px 16px;border-radius:var(--radius);font-size:12px;font-family:var(--mono);z-index:200;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}

  /* Funding */
  .funding-row{display:grid;grid-template-columns:1.5fr 1fr auto auto;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;align-items:center;}
  .funding-name{font-weight:500;font-size:13px;}
  .funding-detail{font-size:12px;color:var(--text-muted);font-family:var(--mono);}

  .empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-icon{font-size:32px;margin-bottom:10px;}

  /* Upcoming calendar */
  .upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px;}
  .upcoming-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:box-shadow .15s;}
  .upcoming-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);}
  .upcoming-item.overdue{border-color:var(--urgent-text);background:var(--urgent-bg);}
  .upcoming-item.soon{border-color:#e07830;background:#fff8f0;}
  .upcoming-date-box{display:flex;flex-direction:column;align-items:center;justify-content:center;width:40px;flex-shrink:0;background:var(--surface2);border-radius:3px;padding:4px 2px;}
  .upcoming-item.overdue .upcoming-date-box{background:var(--urgent-text);color:white;}
  .upcoming-item.soon .upcoming-date-box{background:#e07830;color:white;}
  .upcoming-date-month{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;line-height:1;}
  .upcoming-date-day{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1.1;}
  .upcoming-body{flex:1;min-width:0;}
  .upcoming-title{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:3px;}
  .upcoming-sub{font-size:11px;font-family:var(--mono);color:var(--text-muted);}
  .upcoming-item.overdue .upcoming-sub,.upcoming-item.overdue .upcoming-title{color:var(--urgent-text);}
  .upcoming-item.soon .upcoming-sub,.upcoming-item.soon .upcoming-title{color:#b85000;}

  /* Scratchpad */
  .scratch-entry{width:100%;min-height:80px;padding:10px 12px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);resize:vertical;line-height:1.6;}
  .scratch-entry:focus{outline:2px solid var(--project);border-color:transparent;}
  .scratch-note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
  .scratch-note-body{flex:1;min-width:0;}
  .scratch-note-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .scratch-note-time{font-family:var(--mono);font-size:10px;color:var(--text-faint);margin-top:4px;}
  .scratch-actions{display:flex;gap:6px;flex-shrink:0;flex-direction:column;align-items:flex-end;}
  /* Aims */
  .aim-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
  .aim-item:last-child{border-bottom:none;}
  .aim-number{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--project);background:var(--project-light);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .aim-text{font-size:13px;line-height:1.6;flex:1;}
  .aim-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0;}
  .aim-item:hover .aim-actions{opacity:1;}

  /* Personnel */
  .personnel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:28px;}
  .personnel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}

<script>
(function() {
  const HASH = '8a5c3f2e1d9b7a4f6c8e2d0b5a3f1e9c7d4b2a8f6e3c1d9b7a5f2e0c8d4b1a3';
  function simpleHash(str) {
    let h = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = (h * 0x01000193) >>> 0;
    }
    return h.toString(16).padStart(8,'0');
  }
  // Store a session token so they don't have to re-enter on refresh
  const SESSION_KEY = 'pals_auth';
  if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
    document.getElementById('pw-screen').style.display = 'none';
  }
  window.checkPassword = function() {
    const val = document.getElementById('pw-input').value;
    // Hash the input and compare to stored hash
    // Using a simple multi-round hash for obfuscation
    let h = val;
    for (let i = 0; i < 3; i++) h = simpleHash(h + 'pals');
    const correct = simpleHash('Th3rap3uticsCor3!' + 'pals');
    const correct2 = simpleHash(correct + 'pals');
    const correct3 = simpleHash(correct2 + 'pals');
    if (h === correct3) {
      sessionStorage.setItem(SESSION_KEY, 'ok');
      document.getElementById('pw-screen').style.display = 'none';
    } else {
      const err = document.getElementById('pw-error');
      err.textContent = 'Incorrect password';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
      setTimeout(() => err.textContent = '', 2500);
    }
  };
})();
</script>

async function sbGet(key) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/lab_data?key=eq.${encodeURIComponent(key)}&select=value`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error('Supabase GET failed: ' + res.status);
  const rows = await res.json();
  return rows.length ? rows[0].value : null;
}

async function sbSet(key, value) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/lab_data`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
  });
  if (!res.ok) throw new Error('Supabase SET failed: ' + res.status);
}

async function saveDB() {
  setSyncStatus('saving');
  try {
    await sbSet(DB_KEY, JSON.stringify(DB));
    setSyncStatus('ok');
  } catch(e) {
    console.error('Save failed:', e);
    setSyncStatus('error');
    toast('⚠ Save failed — check connection');
  }
}

async function loadDB() {
  try {
    const val = await sbGet(DB_KEY);
    if (val) {
      const parsed = JSON.parse(val);
      DB = { projects:[], experiments:[], funding:[], adminSections:[], ...parsed };
      // Migrate legacy flat adminTasks → adminSections
      if (!DB.adminSections || !DB.adminSections.length) {
        if (DB.adminTasks && DB.adminTasks.length) {
          DB.adminSections = [{
            id: 'admin-general', name: 'General',
            tasks: DB.adminTasks.map((t, i) => ({
              text: t, status: (DB.adminTasksDone||[])[i] ? 'Done' : 'To do',
              priority: '', personnel: [], linkedExp: '', linkedProj: ''
            }))
          }];
        } else {
          DB.adminSections = JSON.parse(JSON.stringify(DEFAULT_ADMIN_SECTIONS));
        }
        delete DB.adminTasks; delete DB.adminTasksDone;
      }
      // Init manuscripts if missing
      if (!DB.manuscripts) DB.manuscripts = JSON.parse(JSON.stringify(DEFAULT_MANUSCRIPTS));
      if (!DB.scratchpad) DB.scratchpad = [];
      if (!DB.personnel) DB.personnel = JSON.parse(JSON.stringify(DEFAULT_PERSONNEL));
    } else {
      resetToDefaults();
      await saveDB();
    }
  } catch(e) {
    console.error('Load failed:', e);
    setSyncStatus('error');
    resetToDefaults();
    toast('⚠ Could not connect — showing defaults');
  }
}

  DB.manuscripts = JSON.parse(JSON.stringify(DEFAULT_MANUSCRIPTS));
  DB.scratchpad = [];
  DB.personnel = JSON.parse(JSON.stringify(DEFAULT_PERSONNEL));
}

function setSyncStatus(state) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const states = {
    ok:      { color: 'var(--admin)',       text: '● synced' },
    saving:  { color: 'var(--exp)',         text: '● saving…' },
    error:   { color: 'var(--urgent-text)', text: '● offline' },
    loading: { color: 'var(--text-faint)',  text: '● loading…' },
  };
  const s = states[state] || states.ok;
  el.style.color = s.color;
  el.innerHTML = s.text;
}

async function refreshFromServer() {
  setSyncStatus('loading');
  try {
    const val = await sbGet(DB_KEY);
    if (val) {
      const parsed = JSON.parse(val);
      DB = { projects:[], experiments:[], funding:[], adminTasks:[], adminTasksDone:[], ...parsed };
      if (!DB.adminTasksDone) DB.adminTasksDone = [];
    }
    setSyncStatus('ok');
    renderSidebar(); render();
    toast('Refreshed');
  } catch(e) {
    setSyncStatus('error');
    toast('⚠ Could not refresh');
  }
}

function genId() { return Math.random().toString(36).slice(2,9); }
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
function expName(id) { const e = DB.experiments.find(x=>x.id===id); return e?e.name:id; }
function projName(id) { const p = DB.projects.find(x=>x.id===id); return p?p.name:id; }
function statusClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l==='urgent') return 'status-urgent';
  if (l==='complete') return 'status-complete';
  if (l==='ongoing') return 'status-ongoing';
  return 'status-todo';
}
function priorityClass(p) {
  if (!p) return '';
  const l = p.toLowerCase();
  if (l==='urgent') return 'priority-urgent';
  if (l==='high') return 'priority-high';
  if (l==='medium') return 'priority-medium';
  return 'priority-low';
}

// ── Sidebar drag-and-drop ─────────────────────────────────────────────────
let _sbDrag = null;

function sidebarDragStart(e) {
  const el = e.currentTarget;
  _sbDrag = { list: el.dataset.list, idx: parseInt(el.dataset.idx) };
  el.classList.add('sidebar-dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.stopPropagation();
}

function sidebarDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  const el = e.currentTarget;
  if (_sbDrag && el.dataset.list === _sbDrag.list) {
    document.querySelectorAll('.sidebar-item').forEach(x => x.classList.remove('sidebar-drag-over'));
    el.classList.add('sidebar-drag-over');
  }
}

function sidebarDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const el = e.currentTarget;
  if (!_sbDrag || el.dataset.list !== _sbDrag.list) return;
  const toIdx = parseInt(el.dataset.idx);
  const fromIdx = _sbDrag.idx;
  if (fromIdx === toIdx) return;
  const arr = DB[_sbDrag.list];
  if (!arr) return;
  const [moved] = arr.splice(fromIdx, 1);
  arr.splice(toIdx, 0, moved);
  saveDB();
  renderSidebar();
}

function sidebarDragEnd(e) {
  document.querySelectorAll('.sidebar-item').forEach(x => {
    x.classList.remove('sidebar-dragging');
    x.classList.remove('sidebar-drag-over');
  });
  _sbDrag = null;
}

function sidebarItem(pageId, name, dotClass, itemClass, listKey, idx) {
  return `<div class="sidebar-item ${itemClass}${currentPage===pageId?' active':''}"
    draggable="true"
    data-list="${listKey}" data-idx="${idx}"
    onclick="nav('${pageId}',this)"
    ondragstart="sidebarDragStart(event)"
    ondragover="sidebarDragOver(event)"
    ondrop="sidebarDrop(event)"
    ondragend="sidebarDragEnd(event)">
    <span class="sidebar-drag-handle">⠿</span>
    <span class="dot ${dotClass}"></span>${escH(name)}
  </div>`;
}

function renderSidebar() {
  document.getElementById('proj-nav').innerHTML = DB.projects.map((p,i) =>
    sidebarItem('proj-'+p.id, p.name, 'dot-project', 'project-item', 'projects', i)).join('');
  document.getElementById('exp-nav').innerHTML = DB.experiments.map((e,i) =>
    sidebarItem('exp-'+e.id, e.name, 'dot-exp', 'exp-item', 'experiments', i)).join('');
  const adminNav = document.getElementById('admin-nav');
  if (adminNav) adminNav.innerHTML = (DB.adminSections||[]).map((s,i) =>
    sidebarItem('adminsec-'+s.id, s.name, 'dot-admin', 'admin-item', 'adminSections', i)).join('');
  const personnelNav = document.getElementById('personnel-nav');
  if (personnelNav) personnelNav.innerHTML = (DB.personnel||[]).map((p,i) =>
    sidebarItem('person-'+encodeURIComponent(p.name), p.name, 'dot-admin', 'admin-item', 'personnel', i)).join('');
}

// ── Navigation ────────────────────────────────────────────────────────────
function nav(pageId, el) {
  currentPage = pageId;
  document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    document.querySelectorAll('.sidebar-item').forEach(x=>{
      if (x.getAttribute('onclick')=== `nav('${pageId}',this)`) x.classList.add('active');
    });

  document.getElementById('content').scrollTop = 0;
  render();
}

      actEl.innerHTML = `<span class="badge badge-project">Project</span>

        <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">✕ Delete</button>`;

// ── Person helpers ────────────────────────────────────────────────────────
function getAllPeople() {
  const people = new Set();
  DB.projects.forEach(p => {
    p.personnel.forEach(pe => people.add(pe));
    p.tasks.forEach(t => (t.personnel||[]).forEach(pe => people.add(pe)));
  });
  DB.experiments.forEach(e => e.tasks.forEach(t => (t.personnel||[]).forEach(pe => people.add(pe))));
  (DB.adminSections||[]).forEach(s => s.tasks.forEach(t => (t.personnel||[]).forEach(pe => people.add(pe))));
  return [...people].sort();
}

function getAllTasksForPerson(name) {
  const tasks = [];
  DB.projects.forEach(p => {
    p.tasks.forEach((t, i) => {
      if ((t.personnel||[]).includes(name)) {
        tasks.push({ task: t, source: p.name, sourceType: 'project', sourceId: p.id, index: i, ownerType: 'project' });
      }
    });
  });
  DB.experiments.forEach(e => {
    e.tasks.forEach((t, i) => {
      if ((t.personnel||[]).includes(name)) {
        tasks.push({ task: t, source: e.name, sourceType: 'exp', sourceId: e.id, index: i, ownerType: 'exp' });
      }
    });
  });
  (DB.adminSections||[]).forEach(s => {
    s.tasks.forEach((t, i) => {
      if ((t.personnel||[]).includes(name)) {
        tasks.push({ task: t, source: s.name, sourceType: 'admin', sourceId: s.id, index: i, ownerType: 'admin' });
      }
    });
  });
  return tasks;
}

// ── Upcoming items helper ─────────────────────────────────────────────────
function getUpcomingItems() {
  const today = new Date().toISOString().slice(0,10);
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + 60);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  const items = [];

  // Grant progress report deadlines
  (DB.funding||[]).forEach(f => {
    normalizeFunding(f);
    if (f.reportDue) {
      items.push({ date: f.reportDue, title: f.name, sub: 'Progress report due', nav: 'admin-funding', type: 'grant' });
    }
    if (f.endDate) {
      items.push({ date: f.endDate, title: f.name, sub: 'Grant end date', nav: 'admin-funding', type: 'grant' });
    }
  });

  // Task due dates (open tasks only)
  const allSources = [
    ...DB.projects.map(p => p.tasks.map(t => ({...t, srcName: p.name, nav: 'proj-'+p.id}))).flat(),
    ...DB.experiments.map(e => e.tasks.map(t => ({...t, srcName: e.name, nav: 'exp-'+e.id}))).flat(),
    ...(DB.adminSections||[]).map(s => s.tasks.map(t => ({...t, srcName: s.name, nav: 'adminsec-'+s.id}))).flat(),
  ];
  allSources.forEach(t => {
    if (t.dueDate && t.status !== 'Done') {
      items.push({ date: t.dueDate, title: t.text, sub: t.srcName, nav: t.nav, type: 'task' });
    }
  });

  // Sort by date, filter to overdue + next 60 days
  return items
    .filter(x => x.date <= cutoffStr)
    .sort((a,b) => a.date.localeCompare(b.date));
}

// ── Overview ──────────────────────────────────────────────────────────────
function renderOverview() {
  const urgent = DB.projects.filter(p=>p.priority==='Urgent').length;
  const sorted = [...DB.projects].sort((a,b)=>{
    const o={Urgent:0,High:1,Medium:2,Low:3};
    return (o[a.priority]||9)-(o[b.priority]||9);
  });

  const people = getAllPeople();
  const peopleHtml = people.length ? `
    <div class="section-header" style="margin-bottom:14px">Team Members</div>
    <div class="people-grid" style="margin-bottom:28px">
      ${people.map(name => {
        const allTasks = getAllTasksForPerson(name);
        const open = allTasks.filter(x => x.task.status !== 'Done').length;
        const urgent = allTasks.filter(x => x.task.priority === 'Urgent' && x.task.status !== 'Done').length;
        const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
        return `<div class="person-card" onclick="nav('person-${encodeURIComponent(name)}',null)">
          <div class="person-avatar">${escH(initials)}</div>
          <div class="person-name">${escH(name)}</div>
          ${(()=>{ const per=(DB.personnel||[]).find(x=>x.name===name); return per&&per.email?`<div style="font-size:10px;font-family:var(--mono);color:var(--text-faint);margin-bottom:2px">${escH(per.email)}</div>`:''; })()}
          <div class="person-task-count">${open} open task${open!==1?'s':''}${urgent>0?` · <span style="color:var(--urgent-text)">${urgent} urgent</span>`:''}</div>
        </div>`;
      }).join('')}
    </div>` : '';

  return `
    <div class="overview-grid">
      <div class="stat-card"><div class="stat-label">Active Projects</div><div class="stat-value" style="color:var(--project)">${DB.projects.length}</div></div>
      <div class="stat-card"><div class="stat-label">Experiment Types</div><div class="stat-value" style="color:var(--exp)">${DB.experiments.length}</div></div>
      <div class="stat-card"><div class="stat-label">Urgent Priority</div><div class="stat-value" style="color:var(--urgent-text)">${urgent}</div></div>
    </div>
    ${peopleHtml}
    ${(()=>{
      const upcoming = getUpcomingItems();
      if (!upcoming.length) return '';
      const today = new Date().toISOString().slice(0,10);
      const soonCutoff = new Date(); soonCutoff.setDate(soonCutoff.getDate()+14);
      const soonStr = soonCutoff.toISOString().slice(0,10);
      const rows = upcoming.map(item => {
        const d = new Date(item.date + 'T12:00:00');
        const month = d.toLocaleString('default',{month:'short'}).toUpperCase();
        const day = d.getDate();
        const isOverdue = item.date < today;
        const isSoon = !isOverdue && item.date <= soonStr;
        const cls = isOverdue ? 'upcoming-item overdue' : isSoon ? 'upcoming-item soon' : 'upcoming-item';
        const typeIcon = item.type === 'grant' ? '💰' : '📋';
        return `<div class="${cls}" onclick="nav('${item.nav}',null)">
          <div class="upcoming-date-box">
            <span class="upcoming-date-month">${month}</span>
            <span class="upcoming-date-day">${day}</span>
          </div>
          <div class="upcoming-body">
            <div class="upcoming-title">${escH(item.title.length>45?item.title.slice(0,44)+'…':item.title)}</div>
            <div class="upcoming-sub">${typeIcon} ${escH(item.sub)}${isOverdue?' · overdue':''}</div>
          </div>
        </div>`;
      }).join('');
      return `<div class="section-header" style="margin-bottom:14px">Upcoming <span style="color:var(--text-faint);font-weight:400;font-size:10px">next 60 days + overdue</span></div>
        <div class="upcoming-grid" style="margin-bottom:28px">${rows}</div>`;
    })()}
    <div class="section-header">Projects — Current Status
      <button class="btn btn-primary btn-sm" onclick="openAddProject()">＋ Add Project</button>
    </div>
    ${sorted.map(p=>`
      <div class="card" style="cursor:pointer" onclick="nav('proj-${p.id}',null)">
        <div class="card-header">
          <div class="card-title">${p.name}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            <span class="priority-tag ${priorityClass(p.priority)}">${p.priority}</span>
            <span class="status-pill ${statusClass(p.status)}">${p.status}</span>
          </div>
        </div>
        <div class="card-meta">
          ${p.personnel.map(pe=>`<span class="meta-tag person">👤 ${pe}</span>`).join('')}
          ${p.funding.map(f=>`<span class="meta-tag funding">💰 ${f}</span>`).join('')}
        </div>
        ${p.experiments.length?`<div class="exp-links"><div class="exp-links-label">Experiment types</div><div class="exp-chips">
          ${p.experiments.map(eid=>`<span class="exp-chip" onclick="event.stopPropagation();nav('exp-${eid}',null)"><span class="chip-dot"></span>${expName(eid)}</span>`).join('')}
        </div></div>`:''}
      </div>
    `).join('')}`;
}

// ── Person page ───────────────────────────────────────────────────────────
function renderPersonPage(name) {
  const allTasks = getAllTasksForPerson(name);
  if (!allTasks.length) {
    return `<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">No tasks assigned to ${escH(name)} yet.</div></div>`;
  }

  const prioOrder = {Urgent:0,High:1,Medium:2,Low:3,'':4};
  const open = allTasks.filter(x=>x.task.status!=='Done').sort((a,b)=>(prioOrder[a.task.priority]||4)-(prioOrder[b.task.priority]||4));
  const done = allTasks.filter(x=>x.task.status==='Done');

  const sourceTypeLabel = {project:'Project',exp:'Experiment',admin:'Admin'};
  const sourceNavPrefix = {project:'proj-',exp:'exp-',admin:'adminsec-'};
  const sourceBadgeClass = {project:'badge-project',exp:'badge-exp',admin:'badge-admin'};

  function taskRow(x) {
    const t = x.task;
    normalizeTask(t);
    const sc = TASK_STATUS_CLASS[t.status]||'ts-todo';
    const isDone = t.status==='Done';
    const prioHtml = t.priority?`<span class="task-priority-chip ${priorityClass(t.priority)}">${t.priority}</span>`:'';
    const dateDriveHtml = taskDateDriveHtml(t);
    const sourceNav = sourceNavPrefix[x.sourceType]+x.sourceId;
    return `<li>
      <span class="task-status ${sc}" style="cursor:default">${escH(t.status)}</span>
      <div class="todo-body">
        <span class="${isDone?'todo-text-done':''}">${escH(t.text)}</span>
        <div class="task-meta">
          ${prioHtml}
          <span class="badge ${sourceBadgeClass[x.sourceType]}" style="font-size:10px;cursor:pointer" onclick="nav('${sourceNav}',null)">${escH(x.source)}</span>
          ${dateDriveHtml}
        </div>
      </div>
      <div class="todo-actions" style="opacity:1">
        <button class="btn btn-sm" style="font-size:11px" onclick="nav('${sourceNav}',null)">→ Go</button>
      </div>
    </li>`;
  }

  return `
    ${open.length ? `
      <div class="section-header">Open Tasks <span style="color:var(--text-faint);font-weight:400">(${open.length})</span></div>
      <div class="card"><ul class="todo-list">${open.map(taskRow).join('')}</ul></div>
    ` : ''}
    ${done.length ? `
      <div class="section-header" style="margin-top:24px">Completed <span style="color:var(--text-faint);font-weight:400">(${done.length})</span></div>
      <div class="card"><ul class="todo-list">${done.map(taskRow).join('')}</ul></div>
    ` : ''}`;
}

function renderDriveBanner(type, id, url) {
  if (url) {

    </div>`;
  }
  return `<div style="display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px dashed var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px">
    <span style="font-size:12px;font-family:var(--mono);color:var(--text-faint)">No Drive folder linked</span>
    <button class="btn btn-sm" style="margin-left:auto" onclick="editDriveUrl('${type}','${id}')">＋ Add Drive link</button>
  </div>`;
}

function editDriveUrl(type, id) {
  let item;
  if (type === 'project') item = DB.projects.find(x=>x.id===id);
  else if (type === 'exp') item = DB.experiments.find(x=>x.id===id);
  else if (type === 'admin') item = (DB.adminSections||[]).find(x=>x.id===id);
  if (!item) return;

  openModal(`<div class="modal-title">Google Drive Folder Link</div>
    <div class="modal-field"><label class="modal-label">Paste your Drive folder URL</label>
      <input class="modal-input" type="url" id="m-drive-banner-url" value="${escH(item.driveUrl||'')}" placeholder="https://drive.google.com/drive/folders/…">
    </div>
    <div class="modal-footer">
      ${item.driveUrl ? `<button class="btn btn-danger btn-sm" onclick="saveDriveUrl('${type}','${id}','')">Remove link</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDriveUrl('${type}','${id}',document.getElementById('m-drive-banner-url').value.trim())">Save</button>
    </div>`);
  setTimeout(()=>document.getElementById('m-drive-banner-url')?.focus(), 50);
}

function saveDriveUrl(type, id, url) {
  let item;
  if (type === 'project') item = DB.projects.find(x=>x.id===id);
  else if (type === 'exp') item = DB.experiments.find(x=>x.id===id);
  else if (type === 'admin') item = (DB.adminSections||[]).find(x=>x.id===id);
  if (!item) return;
  item.driveUrl = url;
  saveDB(); closeModal(); render(); toast(url ? 'Drive link saved' : 'Drive link removed');
}

// ── Aims ─────────────────────────────────────────────────────────────────
function openAddAim(projId) { openAimModal(projId, null); }
function openEditAim(projId, i) { openAimModal(projId, i); }

function openAimModal(projId, index) {
  const p = DB.projects.find(x=>x.id===projId); if(!p) return;
  if (!p.aims) p.aims = [];
  const isEdit = index !== null && index >= 0;
  const aim = isEdit ? p.aims[index] : { text:'' };
  openModal(`<div class="modal-title">${isEdit ? 'Edit Aim' : 'Add Aim'}</div>
    <div class="modal-field"><label class="modal-label">Aim ${isEdit ? index+1 : p.aims.length+1}</label>
      <textarea class="modal-textarea" id="m-aim-text" style="min-height:100px" placeholder="Describe this aim…">${escH(aim.text)}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="commitAimModal('${projId}',${isEdit?index:'null'})">${isEdit?'Save':'Add Aim'}</button>
    </div>`);
  setTimeout(()=>document.getElementById('m-aim-text')?.focus(), 50);

// ── Drag-and-drop ─────────────────────────────────────────────────────────
let _dragState = null;

function dragStart(e) {
  const li = e.currentTarget;
  _dragState = { type: li.dataset.type, owner: li.dataset.owner, idx: parseInt(li.dataset.idx) };
  li.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const li = e.currentTarget;
  document.querySelectorAll('.todo-list li').forEach(x => x.classList.remove('drag-over'));
  if (_dragState && li.dataset.owner === _dragState.owner) li.classList.add('drag-over');
}

function dragEnd(e) {
  document.querySelectorAll('.todo-list li').forEach(x => { x.classList.remove('dragging'); x.classList.remove('drag-over'); });
  _dragState = null;
}

function dragDrop(e) {
  e.preventDefault();
  const targetLi = e.currentTarget;
  if (!_dragState) return;
  const targetIdx = parseInt(targetLi.dataset.idx);
  const { type, owner, idx: fromIdx } = _dragState;
  if (owner !== targetLi.dataset.owner || fromIdx === targetIdx) return;

  let tasks;
  if (type === 'project') tasks = DB.projects.find(x=>x.id===owner)?.tasks;
  else if (type === 'exp') tasks = DB.experiments.find(x=>x.id===owner)?.tasks;
  else if (type === 'admin') tasks = (DB.adminSections||[]).find(x=>x.id===owner)?.tasks;
  if (!tasks) return;

  // Reorder: move fromIdx to targetIdx position
  const [moved] = tasks.splice(fromIdx, 1);
  tasks.splice(targetIdx, 0, moved);
  saveDB();
  render();
}

// ── Task group renderer ───────────────────────────────────────────────────
function renderTaskGroups(type, ownerId, tasks) {
  if (!tasks.length) return '<div style="color:var(--text-faint);font-size:12px;font-family:var(--mono)">No tasks yet.</div>';

  const groups = [
    { key: 'todo',       label: 'To Do',      cssClass: 'group-todo',       statuses: ['To do'] },
    { key: 'inprogress', label: 'In Progress', cssClass: 'group-inprogress', statuses: ['In progress'] },
    { key: 'done',       label: 'Done',        cssClass: 'group-done',       statuses: ['Done'] },
  ];

  return groups.map(g => {
    // Collect tasks with their original indices
    const workflow = getWorkflow(type, ownerId);
    const lastStatus = workflow[workflow.length - 1];
    const groupTasks = tasks.map((t,i) => ({t,i})).filter(({t}) => {
      normalizeTask(t);
      if (g.key === 'done') return isStatusDone(t.status, workflow);
      if (g.key === 'todo') return t.status === 'To do' || t.status === workflow[0];
      // in progress = anything in between
      return !isStatusDone(t.status, workflow) && t.status !== 'To do' && t.status !== workflow[0];
    });
    if (!groupTasks.length) return '';

    const storageKey = `taskgroup-${type}-${ownerId}-${g.key}`;
    const collapseId = `tg-${type}-${ownerId}-${g.key}`;

    let itemsHtml;
    if (type === 'admin') {
      itemsHtml = groupTasks.map(({t,i}) => renderAdminTaskItem(ownerId, i, t)).join('');
    } else {
      itemsHtml = groupTasks.map(({t,i}) => renderTodoItem(type, ownerId, i, t)).join('');
    }

    return `<div class="task-group ${g.cssClass}">
      <div class="task-group-header" onclick="toggleTaskGroup('${collapseId}')">
        <span class="task-group-label">${g.label}</span>
        <span class="task-group-count">${groupTasks.length}</span>
        <span class="task-group-toggle" id="${collapseId}-toggle">▾</span>
      </div>
      <div id="${collapseId}">
        <ul class="todo-list">${itemsHtml}</ul>
      </div>
    </div>`;
  }).join('');
}

function toggleTaskGroup(collapseId) {
  const el = document.getElementById(collapseId);
  const toggle = document.getElementById(collapseId + '-toggle');
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  if (toggle) toggle.textContent = open ? '▸' : '▾';
}

// ── Todo item ─────────────────────────────────────────────────────────────
const TASK_STATUSES = ['To do', 'In progress', 'Done'];
const TASK_STATUS_CLASS = { 'To do': 'ts-todo', 'In progress': 'ts-inprogress', 'Done': 'ts-done' };
const TASK_STATUS_LABEL = { 'To do': 'To do', 'In progress': 'In progress', 'Done': 'Done' };

// Custom status workflows keyed by experiment id
const CUSTOM_WORKFLOWS = {
  'injections':         ['To do', 'Mice assigned', 'Injected', 'Behavior', 'Perfused/Sac\'ed', 'Dissected', 'Vibratomed'],
  'small-mol-inj':      ['To do', 'Mice assigned', 'Injected', 'Behavior', 'Perfused/Sac\'ed', 'Dissected', 'Vibratomed'],
};

function getWorkflow(type, ownerId) {
  if (type === 'exp' && CUSTOM_WORKFLOWS[ownerId]) return CUSTOM_WORKFLOWS[ownerId];
  return TASK_STATUSES;
}

function getStatusClass(status) {
  if (TASK_STATUS_CLASS[status]) return TASK_STATUS_CLASS[status];
  // Custom statuses: map by position feel
  const customDone = ['Vibratomed'];
  const customProgress = ['Mice assigned', 'Injected', 'Behavior', 'Perfused/Sac\'ed', 'Dissected'];
  if (customDone.includes(status)) return 'ts-done';
  if (customProgress.includes(status)) return 'ts-inprogress';
  return 'ts-todo';
}

function isStatusDone(status, workflow) {
  // Last status in workflow = done
  return status === workflow[workflow.length - 1] || status === 'Done';
}

function normalizeTask(t) {
  if (!t.status) t.status = t.done ? 'Done' : 'To do';
  if (!t.priority) t.priority = '';
  if (!t.personnel) t.personnel = [];
  if (t.linkedExp === undefined) t.linkedExp = '';
  if (t.linkedProj === undefined) t.linkedProj = '';
  if (t.dueDate === undefined) t.dueDate = '';
  if (t.completedDate === undefined) t.completedDate = '';
  if (t.driveUrl === undefined) t.driveUrl = '';
  if (t.description === undefined) t.description = '';
  if (!t.subtasks) t.subtasks = [];
  return t;
}

function taskDateDriveHtml(t) {
  let html = '';
  const today = new Date().toISOString().slice(0,10);
  if (t.dueDate && t.status !== 'Done') {
    const overdue = t.dueDate < today;
    html += `<span class="task-date-chip${overdue?' overdue':''}">📅 Due ${escH(t.dueDate)}</span>`;
  }
  if (t.completedDate && t.status === 'Done') {
    html += `<span class="task-date-chip completed-date">✓ ${escH(t.completedDate)}</span>`;
  }
  if (t.driveUrl) {
    html += `<a class="task-drive-chip" href="${escH(t.driveUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📄 Drive</a>`;
  }
  return html;
}

function renderTodoItem(type, id, i, t) {
  normalizeTask(t);
  const sc = getStatusClass(t.status);
  const workflow = getWorkflow(type, id);
  const isDone = isStatusDone(t.status, workflow);

  const prioHtml = t.priority ? `<span class="task-priority-chip ${priorityClass(t.priority)}">${t.priority}</span>` : '';
  const peopleHtml = (t.personnel||[]).map(p=>`<span class="task-person-chip">👤 ${escH(p)}</span>`).join('');

  let linkHtml = '';
  if (type === 'project' && t.linkedExp) {
    const en = expName(t.linkedExp);
    linkHtml = `<span class="task-link-chip exp-link" onclick="event.stopPropagation();nav('exp-${t.linkedExp}',null)" title="Go to experiment">⬡ ${escH(en)}</span>`;
  } else if (type === 'exp' && t.linkedProj) {
    const pn = projName(t.linkedProj);
    linkHtml = `<span class="task-link-chip proj-link" onclick="event.stopPropagation();nav('proj-${t.linkedProj}',null)" title="Go to project">◈ ${escH(pn)}</span>`;
  }

  const dateDriveHtml = taskDateDriveHtml(t);
  const hasMeta = t.priority || (t.personnel&&t.personnel.length) || linkHtml || dateDriveHtml;

  const expandKey = `expand-${type}-${id}-${i}`;
  const hasExtra = t.description || t.subtasks.length;
  const doneCount = t.subtasks.filter(s=>s.done).length;
  const subProgress = t.subtasks.length ? `<span class="subtask-progress">${doneCount}/${t.subtasks.length} subtasks</span>` : '';

  const descHtml = t.description ? `<div class="task-description">${escH(t.description)}</div>` : '';
  const subtasksHtml = t.subtasks.length ? `<ul class="subtask-list">
    ${t.subtasks.map((s,si)=>`<li>
      <div class="subtask-check ${s.done?'checked':''}" onclick="toggleSubtask('${type}','${id}',${i},${si})"></div>
      <span class="${s.done?'subtask-text-done':''}">${escH(s.text)}</span>
    </li>`).join('')}
  </ul>` : '';

  const expandableContent = hasExtra ? `<div id="${expandKey}" style="display:none">${descHtml}${subtasksHtml}</div>
    <button class="task-expand-btn" onclick="toggleTaskExpand('${expandKey}',this)">▸ ${t.description&&t.subtasks.length?'notes + '+t.subtasks.length+' subtask'+(t.subtasks.length!==1?'s':''):t.description?'show notes':t.subtasks.length+' subtask'+(t.subtasks.length!==1?'s':'')}</button>` : '';

  return `<li draggable="true" data-type="${type}" data-owner="${id}" data-idx="${i}"
    ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)">
    <span class="drag-handle" title="Drag to reorder">⠿</span>
    <span class="task-status ${sc}" id="task-status-${type}-${id}-${i}" onclick="cycleTaskStatus('${type}','${id}',${i})" title="Click to change status">${escH(t.status)}</span>
    <div class="todo-body">
      <span id="task-text-${type}-${id}-${i}" class="${isDone?'todo-text-done':''}">${escH(t.text)}</span>
      ${hasMeta ? `<div class="task-meta">${prioHtml}${peopleHtml}${linkHtml}${dateDriveHtml}${subProgress}</div>` : subProgress ? `<div class="task-meta">${subProgress}</div>` : ''}
      ${expandableContent}
    </div>
    <div class="todo-actions">
      <button class="btn btn-icon btn-sm" title="Edit task" onclick="openEditTask('${type}','${id}',${i})">✎</button>
      <button class="btn btn-icon btn-sm" title="Delete task" onclick="deleteTask('${type}','${id}',${i})">✕</button>
    </div>
  </li>`;
}

function toggleTaskExpand(key, btn) {
  const el = document.getElementById(key);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  btn.textContent = btn.textContent.replace(open ? '▾' : '▸', open ? '▸' : '▾');
}

function toggleSubtask(type, id, i, si) {
  const arr = type==='project' ? DB.projects : DB.experiments;
  const item = arr.find(x=>x.id===id); if(!item) return;
  item.tasks[i].subtasks[si].done = !item.tasks[i].subtasks[si].done;
  saveDB();
  const li = document.getElementById(`task-status-${type}-${id}-${i}`)?.closest('li');
  if (li) li.outerHTML = renderTodoItem(type, id, i, item.tasks[i]);
}

// ── Confetti ──────────────────────────────────────────────────────────────
function launchConfetti(originEl) {
  const rect = originEl ? originEl.getBoundingClientRect() : {left: window.innerWidth/2, top: window.innerHeight/2, width: 0, height: 0};
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;
  const colors = ['#1a4a8a','#c45a10','#2a7a4a','#f5c842','#e05080','#7b4fc9','#17a8c0'];
  const count = 38;
  for (let k = 0; k < count; k++) {
    const el = document.createElement('div');
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 5 + Math.random() * 6;
    const angle = (Math.random() * 360) * Math.PI / 180;
    const speed = 120 + Math.random() * 180;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed - 140;
    const rot = Math.random() * 720 - 360;
    const shape = Math.random() > 0.5 ? '2px' : '50%';
    el.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${size}px;height:${size * (0.5 + Math.random())}px;background:${color};border-radius:${shape};pointer-events:none;z-index:9999;transform-origin:center;`;
    document.body.appendChild(el);
    const start = performance.now();
    const dur = 700 + Math.random() * 500;
    function frame(now) {
      const t = Math.min((now - start) / dur, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const cx = x + vx * ease;
      const cy = y + vy * ease + 300 * ease * ease;
      const opacity = t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.opacity = opacity;
      el.style.transform = `rotate(${rot * ease}deg)`;
      if (t < 1) requestAnimationFrame(frame);
      else el.remove();
    }
    requestAnimationFrame(frame);
  }
}

function cycleTaskStatus(type, id, i) {
  const arr = type==='project' ? DB.projects : DB.experiments;
  const item = arr.find(x=>x.id===id);
  if (!item) return;
  normalizeTask(item.tasks[i]);
  const cur = item.tasks[i].status;
  const workflow = getWorkflow(type, id);
  const idx = workflow.indexOf(cur);
  const next = workflow[(idx >= 0 ? idx + 1 : 0) % workflow.length];
  item.tasks[i].status = next;
  item.tasks[i].done = isStatusDone(next, workflow);
  if (next === 'Done' && !item.tasks[i].completedDate) {
    item.tasks[i].completedDate = new Date().toISOString().slice(0,10);
  } else if (next !== 'Done') {
    item.tasks[i].completedDate = '';
  }
  saveDB();
  // Full re-render of the list item for date chip updates
  const li = document.getElementById(`task-status-${type}-${id}-${i}`)?.closest('li');
  if (next === 'Done') launchConfetti(document.getElementById(`task-status-${type}-${id}-${i}`));
  if (li) li.outerHTML = renderTodoItem(type, id, i, item.tasks[i]);
}

function deleteTask(type, id, i) {
  const arr = type==='project' ? DB.projects : DB.experiments;
  const item = arr.find(x=>x.id===id);
  if (!item) return;
  item.tasks.splice(i,1);
  saveDB(); renderSidebar(); render();
}

function commitTaskModal(type, id, index) {
  const text = document.getElementById('m-task-text')?.value.trim();
  if (!text) { alert('Task description required'); return; }
  const priority = document.getElementById('m-task-priority')?.value || '';
  const status = document.getElementById('m-task-status')?.value || 'To do';
  const linkVal = document.getElementById('m-link')?.value || '';
  const personnel = [...document.querySelectorAll('#m-task-people .checked-proj')].map(el=>el.textContent.trim());

  const description = document.getElementById('m-task-desc')?.value.trim() || '';
  const subtaskLines = (document.getElementById('m-task-subtasks')?.value || '').split('\n').map(s=>s.trim()).filter(Boolean);
  // Preserve done state of existing subtasks by matching text
  const arr2 = type==='project' ? DB.projects : DB.experiments;
  const existing = arr2.find(x=>x.id===id);
  const oldSubs = (existing && index !== null && index >= 0) ? (existing.tasks[index]?.subtasks||[]) : [];
  const subtasks = subtaskLines.map(text => ({ text, done: oldSubs.find(s=>s.text===text)?.done || false }));
  const task = { text, status, done: status === 'Done', priority, personnel,
    linkedExp: type==='project' ? linkVal : '',
    linkedProj: type==='exp' ? linkVal : '',
    description,
    subtasks,
    dueDate: document.getElementById('m-due-date')?.value || '',
    completedDate: document.getElementById('m-completed-date')?.value || '',
    driveUrl: document.getElementById('m-drive-url')?.value.trim() || '',
  };

  const arr = type==='project' ? DB.projects : DB.experiments;
  const item = arr.find(x=>x.id===id);
  if (!item) return;

  if (index !== null && index >= 0) {
    item.tasks[index] = task;
    toast('Task updated');
  } else {
    item.tasks.push(task);
    toast('Task added');
  }
  saveDB(); closeModal(); render();
}

function normalizeFunding(f) {
  // Migrate legacy 'dates' string to startDate/endDate
  if (!f.startDate && !f.endDate && f.dates) {
    const parts = f.dates.split(/\s*[–-]\s*/);
    f.startDate = '';
    f.endDate = '';
    delete f.dates;
  }
  if (f.startDate === undefined) f.startDate = '';
  if (f.endDate === undefined) f.endDate = '';
  if (f.driveUrl === undefined) f.driveUrl = '';
  if (f.reportDue === undefined) f.reportDue = '';
  return f;
}

function formatFundingDates(f) {
  normalizeFunding(f);
  const fmt = d => {
    if (!d) return '';
    const parts = d.split('-');
    if (parts.length === 3) return `${parts[1]}/${parts[2]}/${parts[0]}`;
    return d;
  };
  const s = fmt(f.startDate), e = fmt(f.endDate);
  if (s && e) return `${s} – ${e}`;
  if (s) return `${s} – ongoing`;
  if (e) return `ends ${e}`;
  return '—';
}

  return `<div class="section-header">Active Grants</div>

      normalizeFunding(f);
      const dateDisplay = formatFundingDates(f);
      return `<div class="funding-row">
        <div>
          <div class="funding-name editable" contenteditable="true" onblur="saveFundingField('${f.id}','name',this.textContent)">${escH(f.name)}</div>
          <div class="funding-detail" style="margin-top:2px">${escH(dateDisplay)}</div>
          ${f.reportDue ? `<div class="funding-detail" style="margin-top:3px;color:${f.reportDue < new Date().toISOString().slice(0,10) ? 'var(--urgent-text)' : 'var(--admin)'}">📋 Report due ${escH(f.reportDue)}</div>` : ''}
        </div>

function renderAdminTaskItem(sid, i, t) {
  normalizeTask(t);
  const sc = TASK_STATUS_CLASS[t.status] || 'ts-todo';
  const isDone = t.status === 'Done';
  const prioHtml = t.priority ? `<span class="task-priority-chip ${priorityClass(t.priority)}">${t.priority}</span>` : '';
  const peopleHtml = (t.personnel||[]).map(p=>`<span class="task-person-chip">👤 ${escH(p)}</span>`).join('');
  let linkHtml = '';
  if (t.linkedExp) {
    const en = expName(t.linkedExp);
    linkHtml += `<span class="task-link-chip exp-link" onclick="nav('exp-${t.linkedExp}',null)">⬡ ${escH(en)}</span>`;
  }
  if (t.linkedProj) {
    const pn = projName(t.linkedProj);
    linkHtml += `<span class="task-link-chip proj-link" onclick="nav('proj-${t.linkedProj}',null)">◈ ${escH(pn)}</span>`;
  }
  const dateDriveHtml = taskDateDriveHtml(t);
  const hasMeta = t.priority || (t.personnel&&t.personnel.length) || linkHtml || dateDriveHtml;
  const aExpandKey = `expand-admin-${sid}-${i}`;
  const aHasExtra = t.description || (t.subtasks&&t.subtasks.length);
  const aDoneCount = (t.subtasks||[]).filter(s=>s.done).length;
  const aSubProgress = t.subtasks&&t.subtasks.length ? `<span class="subtask-progress">${aDoneCount}/${t.subtasks.length} subtasks</span>` : '';
  const aDescHtml = t.description ? `<div class="task-description">${escH(t.description)}</div>` : '';
  const aSubtasksHtml = t.subtasks&&t.subtasks.length ? `<ul class="subtask-list">
    ${t.subtasks.map((s,si)=>`<li>
      <div class="subtask-check ${s.done?'checked':''}" onclick="toggleAdminSubtask('${sid}',${i},${si})"></div>
      <span class="${s.done?'subtask-text-done':''}">${escH(s.text)}</span>
    </li>`).join('')}
  </ul>` : '';
  const aExpandable = aHasExtra ? `<div id="${aExpandKey}" style="display:none">${aDescHtml}${aSubtasksHtml}</div>
    <button class="task-expand-btn" onclick="toggleTaskExpand('${aExpandKey}',this)">▸ ${t.description&&t.subtasks&&t.subtasks.length?'notes + '+t.subtasks.length+' subtask'+(t.subtasks.length!==1?'s':''):t.description?'show notes':(t.subtasks&&t.subtasks.length)+' subtask'+((t.subtasks&&t.subtasks.length)!==1?'s':'')}</button>` : '';
  return `<li draggable="true" data-type="admin" data-owner="${sid}" data-idx="${i}"
    ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event)" ondragend="dragEnd(event)">
    <span class="drag-handle" title="Drag to reorder">⠿</span>
    <span class="task-status ${sc}" id="atask-status-${sid}-${i}" onclick="cycleAdminTaskStatus('${sid}',${i})" title="Click to change status">${escH(t.status)}</span>
    <div class="todo-body">
      <span id="atask-text-${sid}-${i}" class="${isDone?'todo-text-done':''}">${escH(t.text)}</span>
      ${hasMeta ? `<div class="task-meta">${prioHtml}${peopleHtml}${linkHtml}${dateDriveHtml}${aSubProgress}</div>` : aSubProgress ? `<div class="task-meta">${aSubProgress}</div>` : ''}
      ${aExpandable}
    </div>
    <div class="todo-actions">
      <button class="btn btn-icon btn-sm" onclick="openEditAdminTask('${sid}',${i})">✎</button>
      <button class="btn btn-icon btn-sm" onclick="deleteAdminTask('${sid}',${i})">✕</button>
    </div>
  </li>`;
}

function toggleAdminSubtask(sid, i, si) {
  const sec = (DB.adminSections||[]).find(x=>x.id===sid); if(!sec) return;
  sec.tasks[i].subtasks[si].done = !sec.tasks[i].subtasks[si].done;
  saveDB();
  const li = document.getElementById(`atask-status-${sid}-${i}`)?.closest('li');
  if (li) li.outerHTML = renderAdminTaskItem(sid, i, sec.tasks[i]);
}

function cycleAdminTaskStatus(sid, i) {
  const sec = (DB.adminSections||[]).find(x=>x.id===sid); if(!sec) return;
  normalizeTask(sec.tasks[i]);
  const next = TASK_STATUSES[(TASK_STATUSES.indexOf(sec.tasks[i].status) + 1) % TASK_STATUSES.length];
  sec.tasks[i].status = next; sec.tasks[i].done = (next==='Done');
  if (next === 'Done' && !sec.tasks[i].completedDate) {
    sec.tasks[i].completedDate = new Date().toISOString().slice(0,10);
  } else if (next !== 'Done') {
    sec.tasks[i].completedDate = '';
  }
  saveDB();
  const li = document.getElementById(`atask-status-${sid}-${i}`)?.closest('li');
  if (next === 'Done') launchConfetti(document.getElementById(`atask-status-${sid}-${i}`));
  if (li) li.outerHTML = renderAdminTaskItem(sid, i, sec.tasks[i]);
}

function deleteAdminTask(sid, i) {
  const sec = (DB.adminSections||[]).find(x=>x.id===sid); if(!sec) return;
  sec.tasks.splice(i,1); saveDB(); render();
}

function commitAdminTaskModal(sid, index) {
  const text = document.getElementById('m-task-text')?.value.trim();
  if (!text) { alert('Task description required'); return; }
  const status = document.getElementById('m-task-status')?.value || 'To do';
  const priority = document.getElementById('m-task-priority')?.value || '';
  const linkedExp = document.getElementById('m-link-exp')?.value || '';
  const linkedProj = document.getElementById('m-link-proj')?.value || '';
  const personnel = [...document.querySelectorAll('#m-task-people .checked-proj')].map(el=>el.textContent.trim());
  const description = document.getElementById('m-task-desc')?.value.trim() || '';
  const subtaskLines2 = (document.getElementById('m-task-subtasks')?.value || '').split('\n').map(s=>s.trim()).filter(Boolean);
  const sec2 = (DB.adminSections||[]).find(x=>x.id===sid);
  const oldSubs2 = (sec2 && index !== null && index >= 0) ? (sec2.tasks[index]?.subtasks||[]) : [];
  const subtasks2 = subtaskLines2.map(text => ({ text, done: oldSubs2.find(s=>s.text===text)?.done || false }));
  const task = { text, status, done: status==='Done', priority, personnel, linkedExp, linkedProj,
    description,
    subtasks: subtasks2,
    dueDate: document.getElementById('m-due-date')?.value || '',
    completedDate: document.getElementById('m-completed-date')?.value || '',
    driveUrl: document.getElementById('m-drive-url')?.value.trim() || '',
  };
  const sec = (DB.adminSections||[]).find(x=>x.id===sid); if(!sec) return;
  if (index !== null && index >= 0) { sec.tasks[index] = task; toast('Task updated'); }
  else { sec.tasks.push(task); toast('Task added'); }
  saveDB(); closeModal(); render();
}

    <tbody>
      ${DB.projects.map(p=>`<tr>
        <td style="font-weight:500;cursor:pointer" onclick="nav('proj-${p.id}',null)">${escH(p.name)}</td>
        ${DB.experiments.map(e=>{
          const linked=p.experiments.includes(e.id);
          return linked
            ? `<td class="has-link" style="cursor:pointer" onclick="nav('exp-${e.id}',null)"><span class="matrix-dot"></span></td>`
            : '<td></td>';
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table></div>
  <p style="margin-top:12px;font-size:12px;color:var(--text-muted)">Click any <span style="color:var(--exp)">●</span> to open that experiment type, or a project name to open the project. Use Edit on any project or experiment to change links.</p>`;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(html) {
  let ov = document.getElementById('modal-overlay');
  if (!ov) { ov=document.createElement('div'); ov.id='modal-overlay'; ov.className='modal-overlay'; document.body.appendChild(ov); }
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.style.display='flex';
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
}
function closeModal() {
  const ov=document.getElementById('modal-overlay'); if(ov) ov.style.display='none';
}

// ── Util ──────────────────────────────────────────────────────────────────
function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.metaKey && document.getElementById('scratch-input') === document.activeElement) {
    saveScratchNote();
  }
});

(async function init() {
  setSyncStatus('loading');
  await loadDB();
  setSyncStatus('ok');
  renderSidebar();
  render();
})();
</script>
</body>
</html>
