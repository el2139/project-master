<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Project Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#f7f7f5;--surface:#fff;--surface2:#f0f0ec;--border:#e0dfd8;
    --text:#1a1a18;--text-muted:#7a7a72;--text-faint:#b0b0a8;
    --project:#1a4a8a;--project-light:#e8effa;
    --exp:#c45a10;--exp-light:#fdf0e8;
    --admin:#2a7a4a;--admin-light:#e8f5ee;
    --urgent-bg:#fdeaea;--urgent-text:#c42a2a;
    --high-bg:#fff3e0;--high-text:#b85000;
    --medium-bg:#fffbe6;--medium-text:#8a6800;
    --radius:4px;
    --mono:'IBM Plex Mono',monospace;
    --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  .app{display:flex;height:100vh;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
  .lab-name{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
  .app-title{font-size:16px;font-weight:600;}
  .sidebar-scroll{overflow-y:auto;flex:1;}
  .sidebar-section{padding:12px 0;border-bottom:1px solid var(--border);}
  .sidebar-section-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);padding:0 16px 6px;display:flex;align-items:center;justify-content:space-between;}
  .sidebar-add-btn{font-size:14px;cursor:pointer;color:var(--text-faint);line-height:1;padding:0 4px;border-radius:2px;}
  .sidebar-add-btn:hover{color:var(--text);background:var(--surface2);}
  .sidebar-item{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;border-left:2px solid transparent;transition:background .1s;font-size:13px;color:var(--text);}
  .sidebar-item:hover{background:var(--surface2);}
  .sidebar-item.active{background:var(--surface2);font-weight:500;}
  .sidebar-item.active.project-item{border-left-color:var(--project);color:var(--project);}
  .sidebar-item.active.exp-item{border-left-color:var(--exp);color:var(--exp);}
  .sidebar-item.active.admin-item{border-left-color:var(--admin);color:var(--admin);}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .dot-project{background:var(--project);}
  .dot-exp{background:var(--exp);}
  .dot-admin{background:var(--admin);}
  .dot-overview{background:var(--text-muted);}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .page-title{font-size:18px;font-weight:600;}
  .page-subtitle{font-size:12px;color:var(--text-muted);margin-top:1px;}
  .topbar-actions{display:flex;gap:8px;align-items:center;}
  .content{flex:1;overflow-y:auto;padding:28px;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* Buttons */
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .1s;}
  .btn:hover{background:var(--surface2);}
  .btn-primary{background:var(--text);color:var(--surface);border-color:var(--text);}
  .btn-primary:hover{background:#333;}
  .btn-danger{background:var(--urgent-bg);color:var(--urgent-text);border-color:var(--urgent-text);}
  .btn-danger:hover{background:#fcc;}
  .btn-sm{padding:3px 8px;font-size:10px;}
  .btn-icon{padding:4px 7px;font-size:14px;line-height:1;min-width:28px;text-align:center;}

  /* Badges */
  .badge{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:3px 8px;border-radius:2px;text-transform:uppercase;font-weight:500;}
  .badge-project{background:var(--project-light);color:var(--project);}
  .badge-exp{background:var(--exp-light);color:var(--exp);}
  .badge-admin{background:var(--admin-light);color:var(--admin);}

  /* Status / Priority pills */
  .status-pill{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
  .status-todo{background:var(--project-light);color:var(--project);}
  .status-ongoing{background:#fff3e0;color:var(--exp);}
  .status-complete{background:var(--admin-light);color:var(--admin);}
  .status-urgent{background:var(--urgent-bg);color:var(--urgent-text);}
  .priority-tag{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:2px;}
  .priority-urgent{background:var(--urgent-bg);color:var(--urgent-text);}
  .priority-high{background:var(--high-bg);color:var(--high-text);}
  .priority-medium{background:var(--medium-bg);color:var(--medium-text);}
  .priority-low{background:var(--surface2);color:var(--text-muted);}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px;}
  .card-title{font-size:15px;font-weight:600;}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px;}
  .meta-tag{font-size:11px;padding:2px 7px;border-radius:2px;background:var(--surface2);color:var(--text-muted);font-family:var(--mono);}
  .meta-tag.person{background:#f0f0ec;color:#444;}
  .meta-tag.funding{background:var(--admin-light);color:var(--admin);}
  .notes-text{font-size:12px;color:var(--text-muted);line-height:1.6;margin-top:6px;}
  .section-header{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}

  /* Chips */
  .exp-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;background:var(--exp-light);color:var(--exp);border-radius:2px;font-size:11px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;transition:border-color .1s;}
  .exp-chip:hover{border-color:var(--exp);}
  .proj-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;background:var(--project-light);color:var(--project);border-radius:2px;font-size:11px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;}
  .proj-chip:hover{border-color:var(--project);}
  .chip-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .exp-links{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .exp-links-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
  .exp-chips{display:flex;flex-wrap:wrap;gap:6px;}

  /* Todo */
  .todo-list{list-style:none;}
  .todo-list li{display:flex;align-items:flex-start;gap:9px;padding:7px 0;font-size:13px;line-height:1.5;border-bottom:1px solid var(--border);}
  .todo-list li:last-child{border-bottom:none;}
  .task-status{font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding:2px 7px;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-top:2px;border:1px solid transparent;user-select:none;transition:opacity .1s;}
  .task-status:hover{opacity:.75;}
  .task-status.ts-todo{background:var(--surface2);color:var(--text-muted);border-color:var(--border);}
  .task-status.ts-inprogress{background:#fff3e0;color:var(--exp);}
  .task-status.ts-done{background:var(--admin-light);color:var(--admin);}
  .todo-text-done{text-decoration:line-through;color:var(--text-faint);}
  .todo-actions{display:flex;gap:4px;margin-left:auto;opacity:0;transition:opacity .15s;flex-shrink:0;}
  .todo-list li:hover .todo-actions{opacity:1;}
  .task-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
  .task-link-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono);cursor:pointer;border:1px solid transparent;}
  .task-link-chip.exp-link{background:var(--exp-light);color:var(--exp);}
  .task-link-chip.exp-link:hover{border-color:var(--exp);}
  .task-link-chip.proj-link{background:var(--project-light);color:var(--project);}
  .task-link-chip.proj-link:hover{border-color:var(--project);}
  .task-person-chip{display:inline-flex;align-items:center;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono);background:var(--surface2);color:var(--text-muted);}
  .task-priority-chip{display:inline-flex;align-items:center;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono);}
  .todo-body{flex:1;min-width:0;}
  .todo-list li{align-items:flex-start;}

  /* Overview grid */
  .overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .stat-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
  .stat-value{font-size:28px;font-weight:300;line-height:1;}

  /* Matrix */
  .matrix-wrap{overflow-x:auto;}
  .matrix{border-collapse:collapse;width:100%;min-width:700px;}
  .matrix th,.matrix td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:12px;}
  .matrix th{background:var(--surface2);font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.05em;color:var(--text-muted);white-space:nowrap;}
  .matrix th.exp-th{color:var(--exp);background:var(--exp-light);}
  .matrix th.proj-th{color:var(--project);background:var(--project-light);}
  .matrix td{background:var(--surface);vertical-align:middle;}
  .matrix-dot{width:10px;height:10px;border-radius:50%;background:var(--exp);margin:auto;display:block;}
  .matrix td.has-link{text-align:center;}

  /* Inline editing */
  .editable{cursor:text;border-radius:2px;transition:background .1s;}
  .editable:hover{background:var(--surface2);}
  .editable:focus{outline:2px solid var(--project);background:var(--surface);border-radius:2px;}
  .edit-field{width:100%;background:var(--surface);border:1px solid var(--project);border-radius:var(--radius);padding:6px 10px;font-family:var(--sans);font-size:13px;color:var(--text);resize:vertical;}
  .edit-field:focus{outline:none;}
  select.edit-select{font-family:var(--mono);font-size:11px;padding:3px 6px;border-radius:2px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:20px;}
  .modal-field{margin-bottom:16px;}
  .modal-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;display:block;}
  .modal-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);}
  .modal-input:focus{outline:2px solid var(--project);border-color:transparent;}
  .modal-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);resize:vertical;min-height:80px;}
  .modal-textarea:focus{outline:2px solid var(--project);border-color:transparent;}
  .modal-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);}
  .modal-select:focus{outline:2px solid var(--project);}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
  .checkbox-group{display:flex;flex-wrap:wrap;gap:6px;}
  .checkbox-item{display:flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:12px;font-family:var(--mono);}
  .checkbox-item.checked-exp{background:var(--exp-light);border-color:var(--exp);color:var(--exp);}
  .checkbox-item.checked-proj{background:var(--project-light);border-color:var(--project);color:var(--project);}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--surface);padding:10px 16px;border-radius:var(--radius);font-size:12px;font-family:var(--mono);z-index:200;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}

  /* Funding */
  .funding-row{display:grid;grid-template-columns:1.5fr 1fr 1fr auto;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;align-items:center;}
  .funding-name{font-weight:500;font-size:13px;}
  .funding-detail{font-size:12px;color:var(--text-muted);font-family:var(--mono);}

  .empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
  .empty-icon{font-size:32px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="lab-name">Wichterle Lab</div>
      <div class="app-title">Project Tracker</div>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Overview</div>
        <div class="sidebar-item overview-item active" onclick="nav('overview',this)"><span class="dot dot-overview"></span>Dashboard</div>
        <div class="sidebar-item overview-item" onclick="nav('matrix',this)"><span class="dot dot-overview"></span>Project × Experiment Matrix</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">
          Projects
          <span class="sidebar-add-btn" title="Add project" onclick="openAddProject()">＋</span>
        </div>
        <div id="proj-nav"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">
          Experiment Types
          <span class="sidebar-add-btn" title="Add experiment type" onclick="openAddExp()">＋</span>
        </div>
        <div id="exp-nav"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Admin</div>
        <div class="sidebar-item admin-item" onclick="nav('admin-funding',this)"><span class="dot dot-admin"></span>Current Funding</div>
        <div class="sidebar-item admin-item" onclick="nav('admin-tasks',this)"><span class="dot dot-admin"></span>Admin Tasks</div>
        <div class="sidebar-item admin-item" onclick="nav('admin-manuscripts',this)"><span class="dot dot-admin"></span>Manuscripts</div>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="page-subtitle" id="page-subtitle">All projects at a glance</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center"><div class="topbar-actions" id="topbar-actions"></div><button class="btn btn-sm" onclick="refreshFromServer()" title="Pull latest changes from server" style="font-size:13px;padding:4px 9px">↻</button><span id="sync-indicator" style="font-family:var(--mono);font-size:10px;color:var(--text-faint);letter-spacing:.05em">●&nbsp;connecting…</span></div>
    </div>
    <div class="content" id="content"><div class="empty"><div class="empty-icon">🔬</div><div>Loading…</div></div></div>
  </main>
</div>
<div class="toast" id="toast"></div>

const SUPABASE_URL = 'https://ykyuavtwizjuabxlrzha.supabase.co';
const SUPABASE_KEY = 'sb_publishable_45vqMlRnKtIMjEVi4KDQSA_adWUX7-u';
const DB_KEY = 'lab-db';

async function sbGet(key) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/lab_data?key=eq.${encodeURIComponent(key)}&select=value`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error('Supabase GET failed: ' + res.status);
  const rows = await res.json();
  return rows.length ? rows[0].value : null;
}

async function sbSet(key, value) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/lab_data`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
  });
  if (!res.ok) throw new Error('Supabase SET failed: ' + res.status);
}

async function saveDB() {
  setSyncStatus('saving');
  try {
    await sbSet(DB_KEY, JSON.stringify(DB));
    setSyncStatus('ok');
  } catch(e) {
    console.error('Save failed:', e);
    setSyncStatus('error');
    toast('⚠ Save failed — check connection');
  }
}

async function loadDB() {
  try {
    const val = await sbGet(DB_KEY);
    if (val) {
      const parsed = JSON.parse(val);
      DB = { ...DB, ...parsed };
      if (!DB.adminTasksDone) DB.adminTasksDone = [];
    } else {
      resetToDefaults();
      await saveDB(); // write defaults to Supabase on first load
    }
  } catch(e) {
    console.error('Load failed:', e);
    setSyncStatus('error');
    resetToDefaults();
    toast('⚠ Could not connect — showing defaults');
  }
}

function resetToDefaults() {
  DB.projects = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
  DB.experiments = JSON.parse(JSON.stringify(DEFAULT_EXPERIMENTS));
  DB.funding = JSON.parse(JSON.stringify(DEFAULT_FUNDING));
  DB.adminTasks = [...DEFAULT_ADMIN];
  DB.adminTasksDone = new Array(DEFAULT_ADMIN.length).fill(false);
}

function setSyncStatus(state) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const states = {
    ok:      { color: 'var(--admin)',       text: '● synced' },
    saving:  { color: 'var(--exp)',         text: '● saving…' },
    error:   { color: 'var(--urgent-text)', text: '● offline' },
    loading: { color: 'var(--text-faint)',  text: '● loading…' },
  };
  const s = states[state] || states.ok;
  el.style.color = s.color;
  el.innerHTML = s.text;
}

async function refreshFromServer() {
  setSyncStatus('loading');
  try {
    const val = await sbGet(DB_KEY);
    if (val) {
      const parsed = JSON.parse(val);
      DB = { projects:[], experiments:[], funding:[], adminTasks:[], adminTasksDone:[], ...parsed };
      if (!DB.adminTasksDone) DB.adminTasksDone = [];
    }
    setSyncStatus('ok');
    renderSidebar(); render();
    toast('Refreshed');
  } catch(e) {
    setSyncStatus('error');
    toast('⚠ Could not refresh');
  }
}

function genId() { return Math.random().toString(36).slice(2,9); }
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
function expName(id) { const e = DB.experiments.find(x=>x.id===id); return e?e.name:id; }
function projName(id) { const p = DB.projects.find(x=>x.id===id); return p?p.name:id; }
function statusClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l==='urgent') return 'status-urgent';
  if (l==='complete') return 'status-complete';
  if (l==='ongoing') return 'status-ongoing';
  return 'status-todo';
}
function priorityClass(p) {
  if (!p) return '';
  const l = p.toLowerCase();
  if (l==='urgent') return 'priority-urgent';
  if (l==='high') return 'priority-high';
  if (l==='medium') return 'priority-medium';
  return 'priority-low';
}

// ── Navigation ────────────────────────────────────────────────────────────
function nav(pageId, el) {
  currentPage = pageId;
  document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    document.querySelectorAll('.sidebar-item').forEach(x=>{
      if (x.getAttribute('onclick')=== `nav('${pageId}',this)`) x.classList.add('active');
    });
  }
  document.getElementById('content').scrollTop = 0;
  render();
}

function render() {
  const titleEl = document.getElementById('page-title');
  const subEl = document.getElementById('page-subtitle');
  const actEl = document.getElementById('topbar-actions');
  const contentEl = document.getElementById('content');
  actEl.innerHTML = '';

  if (currentPage==='overview') {
    titleEl.textContent='Dashboard'; subEl.textContent='All projects at a glance';
    contentEl.innerHTML = renderOverview();
  } else if (currentPage==='matrix') {
    titleEl.textContent='Project × Experiment Matrix'; subEl.textContent='See how experiments connect to projects';
    contentEl.innerHTML = renderMatrix();
  } else if (currentPage==='admin-funding') {
    titleEl.textContent='Current Funding'; subEl.textContent='Admin';
    actEl.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openAddFunding()">＋ Add Grant</button>`;
    contentEl.innerHTML = renderFunding();
  } else if (currentPage==='admin-tasks') {
    titleEl.textContent='Admin Tasks'; subEl.textContent='Admin';
    contentEl.innerHTML = renderAdminTasks();
  } else if (currentPage==='admin-manuscripts') {
    titleEl.textContent='Manuscripts'; subEl.textContent='Admin';
    contentEl.innerHTML = renderManuscripts();
  } else if (currentPage.startsWith('proj-')) {
    const p = DB.projects.find(x=>x.id===currentPage.replace('proj-',''));
    if (p) {
      titleEl.textContent = p.name;
      subEl.textContent = 'Project';
      actEl.innerHTML = `<span class="badge badge-project">Project</span>
        <button class="btn btn-sm" onclick="openEditProject('${p.id}')">✎ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">✕ Delete</button>`;
      contentEl.innerHTML = renderProject(p.id);
    }
  } else if (currentPage.startsWith('exp-')) {
    const e = DB.experiments.find(x=>x.id===currentPage.replace('exp-',''));
    if (e) {
      titleEl.textContent = e.name;

      contentEl.innerHTML = renderExperiment(e.id);
    }
  }
}

// ── Todo item ─────────────────────────────────────────────────────────────
const TASK_STATUSES = ['To do', 'In progress', 'Done'];
const TASK_STATUS_CLASS = { 'To do': 'ts-todo', 'In progress': 'ts-inprogress', 'Done': 'ts-done' };
const TASK_STATUS_LABEL = { 'To do': 'To do', 'In progress': 'In progress', 'Done': 'Done' };

function normalizeTask(t) {
  if (!t.status) t.status = t.done ? 'Done' : 'To do';
  if (!t.priority) t.priority = '';
  if (!t.personnel) t.personnel = [];
  if (t.linkedExp === undefined) t.linkedExp = '';
  if (t.linkedProj === undefined) t.linkedProj = '';
  return t;
}

function renderTodoItem(type, id, i, t) {
  normalizeTask(t);
  const sc = TASK_STATUS_CLASS[t.status] || 'ts-todo';
  const isDone = t.status === 'Done';

  const prioHtml = t.priority ? `<span class="task-priority-chip ${priorityClass(t.priority)}">${t.priority}</span>` : '';
  const peopleHtml = (t.personnel||[]).map(p=>`<span class="task-person-chip">👤 ${escH(p)}</span>`).join('');

  let linkHtml = '';
  if (type === 'project' && t.linkedExp) {
    const en = expName(t.linkedExp);
    linkHtml = `<span class="task-link-chip exp-link" onclick="event.stopPropagation();nav('exp-${t.linkedExp}',null)" title="Go to experiment">⬡ ${escH(en)}</span>`;
  } else if (type === 'exp' && t.linkedProj) {
    const pn = projName(t.linkedProj);
    linkHtml = `<span class="task-link-chip proj-link" onclick="event.stopPropagation();nav('proj-${t.linkedProj}',null)" title="Go to project">◈ ${escH(pn)}</span>`;
  }

  const hasMeta = t.priority || (t.personnel&&t.personnel.length) || linkHtml;

  return `<li>
    <span class="task-status ${sc}" id="task-status-${type}-${id}-${i}" onclick="cycleTaskStatus('${type}','${id}',${i})" title="Click to change status">${escH(t.status)}</span>
    <div class="todo-body">
      <span id="task-text-${type}-${id}-${i}" class="${isDone?'todo-text-done':''}">${escH(t.text)}</span>
      ${hasMeta ? `<div class="task-meta">${prioHtml}${peopleHtml}${linkHtml}</div>` : ''}
    </div>
    <div class="todo-actions">
      <button class="btn btn-icon btn-sm" title="Edit task" onclick="openEditTask('${type}','${id}',${i})">✎</button>
      <button class="btn btn-icon btn-sm" title="Delete task" onclick="deleteTask('${type}','${id}',${i})">✕</button>
    </div>
  </li>`;
}

function cycleTaskStatus(type, id, i) {
  const arr = type==='project' ? DB.projects : DB.experiments;
  const item = arr.find(x=>x.id===id);
  if (!item) return;
  normalizeTask(item.tasks[i]);
  const cur = item.tasks[i].status;
  const next = TASK_STATUSES[(TASK_STATUSES.indexOf(cur) + 1) % TASK_STATUSES.length];
  item.tasks[i].status = next;
  item.tasks[i].done = (next === 'Done');
  saveDB();
  // Update DOM without full re-render
  const pill = document.getElementById(`task-status-${type}-${id}-${i}`);
  const textEl = document.getElementById(`task-text-${type}-${id}-${i}`);
  if (pill) { pill.textContent = next; pill.className = `task-status ${TASK_STATUS_CLASS[next]}`; }
  if (textEl) textEl.className = next === 'Done' ? 'todo-text-done' : '';
}

function deleteTask(type, id, i) {

// ── Add / Edit Task modal ─────────────────────────────────────────────────
function buildTaskModal(type, ownerId, taskIndex) {
  const arr = type==='project' ? DB.projects : DB.experiments;
  const owner = arr.find(x=>x.id===ownerId);
  const isEdit = taskIndex !== null && taskIndex !== undefined && taskIndex >= 0;
  const t = isEdit ? owner.tasks[taskIndex] : {text:'',status:'To do',priority:'',personnel:[],linkedExp:'',linkedProj:''};
  normalizeTask(t);

  // Collect all personnel across all projects for suggestions
  const allPeople = [...new Set(DB.projects.flatMap(p=>p.personnel))].sort();

  // Link options: project tasks link to experiments, experiment tasks link to projects
  let linkSection = '';
  if (type === 'project') {
    const exps = DB.experiments;
    linkSection = `<div class="modal-field"><label class="modal-label">Link to Experiment Type <span style="color:var(--text-faint)">(optional)</span></label>
      <select class="modal-select" id="m-link">
        <option value="">— none —</option>
        ${exps.map(e=>`<option value="${e.id}"${(t.linkedExp||'')=== e.id?' selected':''}>${escH(e.name)}</option>`).join('')}
      </select></div>`;
  } else {
    const projs = DB.projects;
    linkSection = `<div class="modal-field"><label class="modal-label">Link to Project <span style="color:var(--text-faint)">(optional)</span></label>
      <select class="modal-select" id="m-link">
        <option value="">— none —</option>
        ${projs.map(p=>`<option value="${p.id}"${(t.linkedProj||'')=== p.id?' selected':''}>${escH(p.name)}</option>`).join('')}
      </select></div>`;
  }

  // Personnel checkboxes + freetext add
  const taskPersonnel = t.personnel || [];
  const allAvailable = [...new Set([...allPeople, ...taskPersonnel])].sort();

  return `<div class="modal-title">${isEdit ? 'Edit Task' : 'Add Task'}</div>
    <div class="modal-field"><label class="modal-label">Description</label>
      <input class="modal-input" id="m-task-text" value="${escH(t.text)}" placeholder="Describe the task…">
    </div>
    <div style="display:flex;gap:12px">
      <div class="modal-field" style="flex:1"><label class="modal-label">Status</label>
        <select class="modal-select" id="m-task-status">
          ${TASK_STATUSES.map(s=>`<option value="${s}"${t.status===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="modal-field" style="flex:1"><label class="modal-label">Priority</label>
        <select class="modal-select" id="m-task-priority">
          <option value="">— none —</option>
          ${['Urgent','High','Medium','Low'].map(p=>`<option value="${p}"${t.priority===p?' selected':''}>${p}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-field"><label class="modal-label">Assigned To</label>
      <div class="checkbox-group" id="m-task-people">
        ${allAvailable.map(p=>`
          <div class="checkbox-item${taskPersonnel.includes(p)?' checked-proj':''}" id="mtperson-${escH(p)}" onclick="toggleTaskPerson('${escH(p)}')">${escH(p)}</div>
        `).join('')}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <input class="modal-input" id="m-new-person" placeholder="Add person…" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addTaskPersonFromInput();}">
        <button class="btn btn-sm" onclick="addTaskPersonFromInput()">＋ Add</button>
      </div>
    </div>
    ${linkSection}
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="commitTaskModal('${type}','${ownerId}',${isEdit?taskIndex:'null'})">${isEdit?'Save':'Add Task'}</button>
    </div>`;
}

function openAddTask(type, id) {
  openModal(buildTaskModal(type, id, null));
  setTimeout(()=>document.getElementById('m-task-text')?.focus(), 50);
}

function openEditTask(type, id, i) {
  openModal(buildTaskModal(type, id, i));
  setTimeout(()=>document.getElementById('m-task-text')?.focus(), 50);
}

function toggleTaskPerson(name) {
  const el = document.getElementById('mtperson-'+name);
  if (el) el.classList.toggle('checked-proj');
}

function addTaskPersonFromInput() {
  const input = document.getElementById('m-new-person');
  const name = input?.value.trim();
  if (!name) return;
  const container = document.getElementById('m-task-people');
  if (container && !document.getElementById('mtperson-'+name)) {
    const div = document.createElement('div');
    div.className = 'checkbox-item checked-proj';
    div.id = 'mtperson-'+name;
    div.textContent = name;
    div.onclick = () => toggleTaskPerson(name);
    container.appendChild(div);
  } else if (document.getElementById('mtperson-'+name)) {
    document.getElementById('mtperson-'+name).classList.add('checked-proj');
  }
  if (input) input.value = '';
}

function commitTaskModal(type, id, index) {
  const text = document.getElementById('m-task-text')?.value.trim();
  if (!text) { alert('Task description required'); return; }
  const priority = document.getElementById('m-task-priority')?.value || '';
  const status = document.getElementById('m-task-status')?.value || 'To do';
  const linkVal = document.getElementById('m-link')?.value || '';
  const personnel = [...document.querySelectorAll('#m-task-people .checked-proj')].map(el=>el.textContent.trim());

  const task = { text, status, done: status === 'Done', priority, personnel,
    linkedExp: type==='project' ? linkVal : '',
    linkedProj: type==='exp' ? linkVal : ''
  };

  const arr = type==='project' ? DB.projects : DB.experiments;
  const item = arr.find(x=>x.id===id);
  if (!item) return;

  if (index !== null && index >= 0) {
    item.tasks[index] = task;
    toast('Task updated');
  } else {
    item.tasks.push(task);
    toast('Task added');
  }
  saveDB(); closeModal(); render();
}

let _selectedExps = null;
function toggleModalExp(eid) {
  const el = document.getElementById('mexp-'+eid);

  el.classList.toggle('checked-exp');
}

function commitProjectModal(id) {
  const name = document.getElementById('m-name')?.value.trim();
  if (!name) { alert('Name required'); return; }
  const status = document.getElementById('m-status')?.value;
  const priority = document.getElementById('m-priority')?.value;
  const personnel = (document.getElementById('m-personnel')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const funding = (document.getElementById('m-funding')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const notes = document.getElementById('m-notes')?.value||'';
  const experiments = DB.experiments.filter(e=>document.getElementById('mexp-'+e.id)?.classList.contains('checked-exp')).map(e=>e.id);

  if (id) {
    const p = DB.projects.find(x=>x.id===id);
    if (p) Object.assign(p, {name,status,priority,personnel,funding,notes,experiments});
    // sync back-links in experiments
    DB.experiments.forEach(e=>{
      const should = experiments.includes(e.id);
      const has = e.projects.includes(id);
      if (should && !has) e.projects.push(id);
      if (!should && has) e.projects = e.projects.filter(x=>x!==id);
    });
  } else {
    const newId = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') + '-' + genId();
    DB.projects.push({id:newId,name,status,priority,personnel,funding,notes,experiments,tasks:[]});
    experiments.forEach(eid=>{
      const e = DB.experiments.find(x=>x.id===eid);
      if (e && !e.projects.includes(newId)) e.projects.push(newId);
    });
    currentPage = 'proj-'+newId;
  }
  saveDB(); closeModal(); renderSidebar(); render(); toast(id?'Project updated':'Project created');
}

function commitExpModal(id) {
  const name = document.getElementById('m-name')?.value.trim();
  if (!name) { alert('Name required'); return; }
  const notes = document.getElementById('m-notes')?.value||'';
  const projects = DB.projects.filter(p=>document.getElementById('mproj-'+p.id)?.classList.contains('checked-proj')).map(p=>p.id);

  if (id) {
    const e = DB.experiments.find(x=>x.id===id);
    if (e) { e.name=name; e.notes=notes; e.projects=projects; }
    DB.projects.forEach(p=>{
      const should=projects.includes(p.id), has=p.experiments.includes(id);
      if(should&&!has) p.experiments.push(id);
      if(!should&&has) p.experiments=p.experiments.filter(x=>x!==id);
    });
  } else {
    const newId = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') + '-' + genId();
    DB.experiments.push({id:newId,name,notes,projects,tasks:[]});
    projects.forEach(pid=>{
      const p=DB.projects.find(x=>x.id===pid);
      if(p&&!p.experiments.includes(newId)) p.experiments.push(newId);
    });
    currentPage='exp-'+newId;
  }
  saveDB(); closeModal(); renderSidebar(); render(); toast(id?'Experiment type updated':'Experiment type created');
}

  DB.projects = DB.projects.filter(x=>x.id!==id);
  DB.experiments.forEach(e=>{ e.projects=e.projects.filter(x=>x!==id); });

function deleteExp(id) {
  if (!confirm('Delete this experiment type? This cannot be undone.')) return;
  DB.experiments = DB.experiments.filter(x=>x.id!==id);
  DB.projects.forEach(p=>{ p.experiments=p.experiments.filter(x=>x!==id); });
  currentPage='overview'; saveDB(); renderSidebar(); render(); toast('Experiment type deleted');
}

function renderAdminTasks() {
  while (DB.adminTasksDone.length < DB.adminTasks.length) DB.adminTasksDone.push(false);
  return `<div class="section-header">Open Admin Tasks
    <button class="btn btn-sm" onclick="openAddAdminTask()">＋ Add</button>
  </div>
  <div class="card">
    <ul class="todo-list">
      ${DB.adminTasks.map((t,i)=>`<li>
        <div class="todo-check ${DB.adminTasksDone[i]?'checked':''}" onclick="toggleAdminTask(${i})"></div>
        <span id="adm-text-${i}" class="${DB.adminTasksDone[i]?'todo-text-done':''}" style="flex:1">${escH(t)}</span>
        <div class="todo-actions">
          <button class="btn btn-icon btn-sm" onclick="editAdminTask(${i})">✎</button>

        </div>

function toggleAdminTask(i) {
  DB.adminTasksDone[i] = !DB.adminTasksDone[i];
  saveDB();
  const span = document.getElementById('adm-text-'+i);
  const check = span?.previousElementSibling;
  if (span) span.className = DB.adminTasksDone[i]?'todo-text-done':'';
  if (check) check.className = 'todo-check'+(DB.adminTasksDone[i]?' checked':'');
}

function deleteAdminTask(i) {
  DB.adminTasks.splice(i,1); DB.adminTasksDone.splice(i,1); saveDB(); render();
}

function editAdminTask(i) {
  const span=document.getElementById('adm-text-'+i); if(!span) return;
  const old=DB.adminTasks[i];
  const input=document.createElement('input'); input.value=old; input.className='edit-field'; input.style.cssText='flex:1;padding:2px 6px;font-size:13px;';
  span.replaceWith(input); input.focus(); input.select();
  function commit(){ DB.adminTasks[i]=input.value.trim()||old; saveDB(); render(); }
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){input.value=old;commit();}});
}

function openAddAdminTask() {
  openModal(`<div class="modal-title">Add Admin Task</div>
    <div class="modal-field"><label class="modal-label">Task</label><input class="modal-input" id="m-task" autofocus></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="commitAddAdminTask()">Add</button>

  setTimeout(()=>document.getElementById('m-task')?.focus(),50);
}
function commitAddAdminTask() {
  const t=document.getElementById('m-task')?.value.trim(); if(!t) return;
  DB.adminTasks.push(t); DB.adminTasksDone.push(false); saveDB(); closeModal(); render(); toast('Task added');
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(html) {
  let ov = document.getElementById('modal-overlay');
  if (!ov) { ov=document.createElement('div'); ov.id='modal-overlay'; ov.className='modal-overlay'; document.body.appendChild(ov); }
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.style.display='flex';
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
}
function closeModal() {
  const ov=document.getElementById('modal-overlay'); if(ov) ov.style.display='none';
}

function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
